server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 静态资源缓存 ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA 路由回退：所有路径返回 index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 代理 /chat-api → 后端容器（支持 SSE 流式传输）────────
    location /chat-api/ {
        proxy_pass http://backend:8003/;
        proxy_http_version 1.1;

        # SSE / 流式必须禁用缓冲区
        proxy_buffering          off;
        proxy_cache              off;
        proxy_set_header         Connection  "";
        chunked_transfer_encoding on;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;   # 流式对话最长 5 分钟
        proxy_send_timeout    60s;
    }

    # ── 代理 /api → 外部数据 API（API Key 留在服务器端）──────
    location /api/ {
        proxy_pass http://47.110.226.140:8080/;
        proxy_set_header X-API-Key          xK7mP9nQ2wR5tY8uI1oL4aS6dF3gH0jK;
        proxy_set_header Host               47.110.226.140;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── 错误页 ────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
